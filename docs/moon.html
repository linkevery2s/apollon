<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>月齢カレンダー</title>
<style>

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;  /* 横中央 */
  align-items: center;      /* 縦中央 */
  background: #111;
  color: white;
  font-family: sans-serif;
}

#container {
  text-align: center;
}

   .day {
    border: 1px solid #444;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    background: #222;
  }
  .day:hover { background: #333; }
  .moon {
    font-size: 20px;
    margin-top: 5px;
  }
</style>
</head>
<body>

<div id="container">

  <h2 style="text-align:center;" id="title"></h2>

  <div id="calendar"></div>

</div>



<script>

// ===== 月齢計算 =====
const synodicMonth = 29.530588853;

function getMoonAge(date) {
  const base = new Date('2000-01-06T18:14:00Z'); // 新月基準
  const diff = (date - base) / (1000 * 60 * 60 * 24);
  return (diff % synodicMonth + synodicMonth) % synodicMonth;
}

// ===== フェーズアイコン =====
function getMoonIcon(age) {
  if (age < 1.845) return "🌑";
  if (age < 5.536) return "🌒";
  if (age < 9.228) return "🌓";
  if (age < 12.919) return "🌔";
  if (age < 16.610) return "🌕";
  if (age < 20.302) return "🌖";
  if (age < 23.993) return "🌗";
  if (age < 27.684) return "🌘";
  return "🌑";
}

// ===== カレンダー生成 =====
function generateCalendar(year, month) {
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  document.getElementById("title").innerText = `${year}年 ${month+1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  // 空白
  for (let i = 0; i < firstDay; i++) {
    calendar.appendChild(document.createElement("div"));
  }

  // 日付
  for (let d = 1; d <= lastDate; d++) {
    const date = new Date(year, month, d);
    const age = getMoonAge(date);
    const icon = getMoonIcon(age);

    const div = document.createElement("div");
    div.className = "day";
    div.innerHTML = `
      <div>${d}</div>
      <div class="moon">${icon}</div>
    `;

    // 🔥 ここが重要：クリックイベント
    div.onclick = () => {
      alert(`${date.toDateString()} / 月齢: ${age.toFixed(1)}`);
      
      // 👉 ここにSpaceKit連携を書く
      // sim.setTime(date);
    };

    calendar.appendChild(div);
  }
}

// ===== 初期表示 =====
const today = new Date();
generateCalendar(today.getFullYear(), today.getMonth());

</script>

</body>
</html>
