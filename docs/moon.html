<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Moon Phase with SpaceKit</title>
<script src="https://typpo.github.io/spacekit/build/spacekit.js"></script>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: sans-serif;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 8px;
  }
  button { margin: 2px; }
</style>
</head>
<body>

<div id="ui">
  <div>
    <button onclick="setView('sun')">太陽視点</button>
    <button onclick="setView('earth')">地球視点</button>
    <button onclick="setView('free')">フリー</button>
  </div>

  <div style="margin-top:8px;">
    時間速度:
    <input type="range" min="1" max="200" value="10" id="speed">
  </div>

  <div style="margin-top:8px;">
    月の状態: <span id="phase">---</span>
  </div>
</div>

<script>
const sim = new Spacekit.Simulation(document.body, {
  basePath: 'https://typpo.github.io/spacekit/src',
});

const viewer = sim.getViewer();

// ===== 天体 =====
const sun = sim.createObject('sun', {
  ephem: Spacekit.Ephem.PLANETS.sun,
  scale: 10,
});

const earth = sim.createObject('earth', {
  ephem: Spacekit.Ephem.PLANETS.earth,
  scale: 1,
});

const moon = sim.createObject('moon', {
  ephem: Spacekit.Ephem.PLANETS.moon,
  scale: 0.27,
});

// ===== 光源（満ち欠けの核心）=====
const light = new THREE.DirectionalLight(0xffffff, 1.5);
viewer.scene.add(light);

// ===== 初期設定 =====
sim.setSpeed(10);
viewer.followObject(earth);

// ===== UI =====
function setView(mode) {
  if (mode === 'sun') viewer.followObject(sun);
  if (mode === 'earth') viewer.followObject(earth);
  if (mode === 'free') viewer.stopFollowing();
}

document.getElementById("speed").addEventListener("input", (e) => {
  sim.setSpeed(parseFloat(e.target.value));
});

// ===== 満ち欠け計算 =====
function getPhase(dot) {
  if (dot > 0.75) return "満月";
  if (dot > 0.25) return "凸月";
  if (dot > -0.25) return "半月";
  if (dot > -0.75) return "三日月";
  return "新月";
}

// ===== 毎フレーム更新 =====
sim.onTick(() => {
  const sunPos = new THREE.Vector3(...sun.getPosition());
  const earthPos = new THREE.Vector3(...earth.getPosition());
  const moonPos = new THREE.Vector3(...moon.getPosition());

  // 光を太陽から当てる
  light.position.copy(sunPos);

  // 満ち欠け計算
  const sunToMoon = moonPos.clone().sub(sunPos).normalize();
  const earthToMoon = moonPos.clone().sub(earthPos).normalize();
  const dot = sunToMoon.dot(earthToMoon);

  document.getElementById("phase").innerText = getPhase(dot);
});
</script>

</body>
</html>
